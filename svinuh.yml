# Registry of flashable projects. Add an entry here to make a project
# available via `./svinuh flash <name>` - nothing else to wire up.
fqbn: esp32:esp32:esp32cam # every project here runs on this board

projects:
  - name: web-cam-manual
    desc: ESP32 access point + web UI (WebSocket control, MJPEG camera)
    prebuild_script: scripts/build_web.py

  - name: udp-control
    desc: ESP32 joins your WiFi, control page runs on your computer (UDP + MJPEG)
    secrets_file: secrets.h
