<svg viewBox="0 0 1300 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe Print','Bradley Hand','Comic Sans MS',cursive">
  <defs>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e1e1e"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="650" fill="#ffffff"/>

  <text x="40" y="34" font-size="22" font-weight="700" fill="#1e1e1e">svinuh-robotics / web-cam-manual — runtime architecture</text>

  <!-- Browser -->
  <g transform="rotate(-0.6 170 360)">
    <rect x="40" y="250" width="260" height="220" rx="14" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5" filter="url(#rough)"/>
  </g>
  <text x="170" y="290" font-size="18" font-weight="700" fill="#1e1e1e" text-anchor="middle">Phone / laptop</text>
  <text x="170" y="312" font-size="15" fill="#1e1e1e" text-anchor="middle">browser</text>
  <text x="170" y="348" font-size="13.5" fill="#1e1e1e" text-anchor="middle">index.html + app.js</text>
  <text x="170" y="368" font-size="13.5" fill="#1e1e1e" text-anchor="middle">WASD / buttons / sliders</text>
  <text x="170" y="392" font-size="13.5" font-weight="700" fill="#1e1e1e" text-anchor="middle">= this sends the signals</text>

  <!-- Port 80 box -->
  <g transform="rotate(0.4 650 155)">
    <rect x="420" y="60" width="460" height="190" rx="14" fill="#fff3bf" stroke="#1e1e1e" stroke-width="2.5" filter="url(#rough)"/>
  </g>
  <text x="440" y="88" font-size="16.5" font-weight="700" fill="#1e1e1e">:80 camera_httpd  (app_httpd.cpp)</text>
  <text x="440" y="118" font-size="14" fill="#1e1e1e">/          -&gt; index_handler    (gzip HTML)</text>
  <text x="440" y="144" font-size="14" fill="#1e1e1e">/app.js    -&gt; js_handler       (gzip JS)</text>
  <text x="440" y="170" font-size="14" fill="#1e1e1e">/ws        -&gt; ws_handler       (WebSocket)</text>
  <text x="440" y="196" font-size="14" fill="#1e1e1e">/capture   -&gt; capture_handler  (1 JPEG)</text>

  <!-- ws dispatch (directly under :80, since ws_handler lives inside it) -->
  <g transform="rotate(0.5 650 305)">
    <rect x="420" y="270" width="460" height="70" rx="14" fill="#ffe066" stroke="#1e1e1e" stroke-width="2.5" filter="url(#rough)"/>
  </g>
  <text x="440" y="298" font-size="16" font-weight="700" fill="#1e1e1e">handle_ws_cmd()</text>
  <text x="440" y="322" font-size="14" fill="#1e1e1e">F / B / L / R / S · V&lt;0-255&gt; · D&lt;0-255&gt;</text>

  <!-- Port 81 box -->
  <g transform="rotate(-0.5 650 400)">
    <rect x="420" y="360" width="460" height="80" rx="14" fill="#fff3bf" stroke="#1e1e1e" stroke-width="2.5" filter="url(#rough)"/>
  </g>
  <text x="440" y="388" font-size="16.5" font-weight="700" fill="#1e1e1e">:81 stream_httpd  (app_httpd.cpp)</text>
  <text x="440" y="414" font-size="14" fill="#1e1e1e">/stream -&gt; stream_handler  (MJPEG video)</text>

  <!-- init note -->
  <g transform="rotate(-0.4 650 515)">
    <rect x="420" y="460" width="460" height="110" rx="14" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="6 5" filter="url(#rough)"/>
  </g>
  <text x="440" y="486" font-size="14.5" font-weight="700" fill="#1e1e1e">startup (runs once at boot)</text>
  <text x="440" y="512" font-size="13" fill="#1e1e1e">web-cam-manual.ino: setup() -&gt; initMotors()</text>
  <text x="440" y="534" font-size="13" fill="#1e1e1e">CameraWebServer.cpp: CameraWebServer_init()</text>
  <text x="440" y="554" font-size="13" fill="#1e1e1e">-&gt; WiFi AP 192.168.4.1 + esp_camera_init()</text>

  <!-- Camera hw -->
  <g transform="rotate(0.6 1130 190)">
    <rect x="1000" y="140" width="260" height="100" rx="14" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2.5" filter="url(#rough)"/>
  </g>
  <text x="1130" y="175" font-size="15.5" font-weight="700" fill="#1e1e1e" text-anchor="middle">OV2640 camera</text>
  <text x="1130" y="197" font-size="12.5" fill="#1e1e1e" text-anchor="middle">GPIO pins defined in</text>
  <text x="1130" y="215" font-size="12.5" fill="#1e1e1e" text-anchor="middle">CameraWebServer.cpp</text>

  <!-- Motors -->
  <g transform="rotate(-0.5 1130 335)">
    <rect x="1000" y="290" width="260" height="90" rx="14" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2.5" filter="url(#rough)"/>
  </g>
  <text x="1130" y="323" font-size="15.5" font-weight="700" fill="#1e1e1e" text-anchor="middle">L298N H-bridge</text>
  <text x="1130" y="345" font-size="12.5" fill="#1e1e1e" text-anchor="middle">ENR/ENL speed (PWM)</text>
  <text x="1130" y="363" font-size="12.5" fill="#1e1e1e" text-anchor="middle">+ 4 direction pins</text>

  <!-- LED -->
  <g transform="rotate(0.5 1130 435)">
    <rect x="1000" y="400" width="260" height="70" rx="14" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2.5" filter="url(#rough)"/>
  </g>
  <text x="1130" y="430" font-size="15.5" font-weight="700" fill="#1e1e1e" text-anchor="middle">Onboard LED</text>
  <text x="1130" y="451" font-size="12.5" fill="#1e1e1e" text-anchor="middle">GPIO4, PWM brightness</text>

  <!-- Arrows: Browser -> Port80 -->
  <path d="M300,290 C 360,260 385,180 418,150" fill="none" stroke="#1e1e1e" stroke-width="2.2" marker-end="url(#arrow)" filter="url(#rough)"/>
  <text x="312" y="220" font-size="12.5" fill="#0b5394">HTTP GET / , /app.js , /capture</text>
  <text x="312" y="237" font-size="12.5" fill="#0b5394">WS /ws: F B L R S · V&lt;n&gt; · D&lt;n&gt;</text>
  <text x="312" y="254" font-size="11" fill="#495057">(one open socket, few bytes/cmd)</text>

  <!-- Browser -> Port81 -->
  <path d="M300,430 C 360,440 385,400 418,400" fill="none" stroke="#1e1e1e" stroke-width="2.2" marker-end="url(#arrow)" filter="url(#rough)"/>
  <text x="312" y="463" font-size="12.5" fill="#0b5394">HTTP GET :81/stream</text>
  <text x="312" y="480" font-size="11" fill="#495057">(MJPEG, continuous)</text>

  <!-- Port80 -> ws dispatch -->
  <path d="M650,250 C 650,257 650,263 650,268" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)" filter="url(#rough)"/>
  <text x="662" y="264" font-size="11.5" fill="#495057">ws frame</text>

  <!-- ws dispatch -> Motors / LED -->
  <path d="M880,300 C 940,300 965,310 998,320" fill="none" stroke="#1e1e1e" stroke-width="2.2" marker-end="url(#arrow)" filter="url(#rough)"/>
  <text x="895" y="290" font-size="12.5" fill="#2b6b2f">WheelAct()</text>

  <path d="M880,325 C 950,360 975,405 998,428" fill="none" stroke="#1e1e1e" stroke-width="2.2" marker-end="url(#arrow)" filter="url(#rough)"/>
  <text x="895" y="362" font-size="12.5" fill="#b25c00">ledcWrite(gpLed)</text>

  <!-- Port80/Port81 -> Camera -->
  <path d="M880,150 C 940,144 966,163 998,180" fill="none" stroke="#1e1e1e" stroke-width="2.2" marker-end="url(#arrow)" filter="url(#rough)"/>
  <text x="895" y="128" font-size="12" fill="#a61e4d">esp_camera_fb_get()</text>
  <text x="895" y="144" font-size="11" fill="#495057">(capture_handler)</text>

  <path d="M880,390 C 945,300 968,245 998,218" fill="none" stroke="#1e1e1e" stroke-width="2.2" marker-end="url(#arrow)" filter="url(#rough)"/>
  <text x="895" y="405" font-size="12" fill="#a61e4d">esp_camera_fb_get()</text>
  <text x="895" y="421" font-size="11" fill="#495057">(stream_handler)</text>

  <text x="40" y="610" font-size="12.5" fill="#495057">Every control used to be its own HTTP request (~300+ bytes, fresh TCP connection). One open WebSocket now costs a few bytes per command.</text>
</svg>
